<main>
 
  <!--header -->
        <header class="topmenu">
            <div class="brand">
              <div class="logo-sq">
                <img src="{{url_for('static', filename='image/logo2.png')}}" alt="NovaSight Logo" class="brand-logo">
              </div>
                <div class="brand-text">
                    <h1>NOVASIGHT</h1>
                    <span>ACADEMIC PREDICTION</span>
                </div>
            </div>

            <!-- user-profile section -->
            <a href="{% if user %}{{ url_for('cahs_bp.profile_cahs') }}{% else %}{{ url_for('login') }}{% endif %}" class="user-profile">
                {% if user %}
                    <!-- Logged-in user -->
                    <span>{{ user.username }}</span>

                {% if user.profile_image_url %}
                    <img src="{{ user.profile_image_url }}" alt="User Avatar" class="avatar" style="background-color: rgb(143, 185, 219);">
                    {% else %}
                        <!-- Default SVG when logged in but NO image -->
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="avatar" style="width: 32px; height: 32px;">
                          <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
                        </svg>
                    {% endif %}

                {% else %}
                    <!-- Not logged in -->
                    <span>Login</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="avatar" style="width: 32px; height: 32px;">
                      <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
                    </svg>
                {% endif %}
            </a>
        </header>

    <section class="dashboard-grid">
      <div class="card card-mini"></div>
      <div class="card card-mini"></div>
      <div class="card card-mini"></div>
      <div class="card card-mini"></div>
      <div class="card card-mini"></div>

      <div class="card card-wide"></div>
      <div class="card card-square"></div>
      <div class="card card-square"></div>

      <div class="card card-full-width"></div>
      <div class="card third-square"></div>

      <div class="card card-bottom-large"></div>
      <div class="card card-bottom-small"></div>
    </section>

  </section>

    <!-- Logout Modal Structure -->
  <div id="logoutModal" class="modal-overlay" style="display: none;"> <!-- Initially hidden -->
    <div class="logout-card">
      <h1 class="brand-name">NovaSight</h1>
      <p class="confirmation-text">Are you sure you want to logout?</p>
      <div class="button-group">
        <button id="confirmLogoutBtn" class="btn btn-primary">Logout</button>
        <button id="cancelLogoutBtn" class="btn btn-primary">Back</button>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/logout.js') }}"></script>

  <footer class="footer">
    <div class="footer-content">
        <span class="page-label">Page/</span><span class="page-name">Main Dashboard</span>
    </div>
  </footer> 
</main>
</body>
</html>
